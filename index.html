<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="title">Etch-A-Sketch</div>
    
    <div id="main">

        <div id="tools">
            <div id="single-tools">
                <input class="tool" type="color" id="colour">
                <button class="tool" id="pen">Pen</button>
                <button class="tool" id="rgb">RGB Pen</button>
                <button class="tool" id="eraser">Eraser</button>
                <button class="tool" id="clear">Clear</button>
            </div>
            

            <!-- Dynamic grid adjust -->
            <div id="grid-size-adjuster">
                <input type="range" min="1" max="60" value="16" id="slider">
                <div id="grid-size">16 x 16</div>
            </div>
        </div>

        <div id="grid"></div>
    </div>


    <script src="./script.js"></script>
</body>
</html>
